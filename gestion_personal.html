<!-- Firebase module -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, deleteField, collection, collectionGroup, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

if (typeof FIREBASE_CONFIG === 'undefined') { alert('Error: falta config.js'); throw new Error(); }

// Inicializar window.distribuciones AQUÍ para que cargarDistFecha funcione
window.distribuciones = {};
const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

// Exponer para el script global
window._db      = db;
window._fDoc    = doc;
window._fGetDoc = getDoc;
window._fGetDocs= getDocs;
window._fSetDoc = setDoc;
window._fDelDoc = deleteDoc;
window._fCol    = collection;
window._fColGroup = collectionGroup;
window._fBatch  = writeBatch;
window._fDeleteField = deleteField;
window._fUpdateDoc = updateDoc;
// Actualiza campos con notación de punto ("asignaciones.<id>"); si el
// documento de esa fecha todavía no existe, lo crea vacío y reintenta
// (updateDoc() sólo falla por "not-found" en ese caso puntual).
window._fUpdateOrCrear = async function(ref, campos) {
  try {
    await updateDoc(ref, campos);
  } catch (e) {
    await setDoc(ref, {}, { merge: true });
    await updateDoc(ref, campos);
  }
};

// -- ARRANQUE -------------------------------------------------------------
// Exponer cambiarTab globalmente desde el módulo para que los onclick HTML funcionen
// incluso si el script inline todavia no cargó
window.cambiarTab = function(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
  // Las acciones adicionales se ejecutarán cuando el script inline esté listo
  if (window._cambiarTabExtra) window._cambiarTabExtra(id);
};

// Validar la sesión primero (una sola lectura chica) y recién después
// disparar cargarTodo() (que lee nómina/novedades/zonas/etc. — puede tardar
// varios segundos). Si van en paralelo compiten por la misma conexión a
// Firestore y el login queda atascado detrás de la carga pesada.
// cargarTodo ahora vive en personal-datos.js (script clásico, otro scope
// léxico que este módulo) — por eso se llama como window.cargarTodo.
if (window.restaurarSesion) window.restaurarSesion().then(window.cargarTodo);
else window.cargarTodo();
</script>

<script>
// ============================================================
//  ESTADO GLOBAL
// ============================================================
window.nomina         = [];
window.novedades      = [];
window.zonas          = [];
window.eventos        = [];
window.distribuciones = {};
window.tiposNovedad   = ['Licencia','Llegada tarde','Retiro anticipado','Ausencia','Otro'];
window.feriados       = []; // Array de strings 'YYYY-MM-DD'

// ── NÓMINA INICIAL (se sube a Firestore la primera vez) ──────────────────
// La nómina real vive SOLO en Firestore (colección nomina_chunks). Antes acá
// había un seed hardcodeado con datos personales (DNI/CUIL/celulares) que se
// servía públicamente a cualquier visitante — se eliminó por privacidad.
// NOTA: La nómina completa de 343 personas se sube desde el backup (ver instrucciones)


// ============================================================
//  UTILIDADES
// ============================================================
const fmtDate  = d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-AR'):'—';
// esc()/escJsAttr() ahora viven en utils.js (compartido por todo el portal)

// Fecha de asignación (puede ser distinta al día visualizado)
function getFechaAsig() {
  return document.getElementById('dist-fecha-asig')?.value || todayISO();
}
function getDistAsig() { return window.distribuciones[getFechaAsig()]||{}; }

function toast(msg,ms=2400) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}

function getFecha(){return document.getElementById('fecha-global').value||todayISO();}
function getDistHoy(){return window.distribuciones[getFecha()]||{};}

function exportCSV(rows,fn){
  if(!rows.length) return;
  const h=Object.keys(rows[0]);
  const lines=[h.join(','),...rows.map(r=>h.map(k=>`"${(r[k]||'').toString().replace(/"/g,'""')}"` ).join(','))];
  const b=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();
}

// ============================================================
//  TABS
// ============================================================
// La versión completa de cambiarTab se registra aquí y se llama vía _cambiarTabExtra
window._cambiarTabExtra = function(id) {
  if(id==='distribucion') cargarDistYRender();
  else renderAll();
}

// ============================================================
//  INIT
// ============================================================
async function init() {
  // restaurarSesion() ya se disparó antes desde el script módulo, en paralelo
  // con la carga de datos (para que el usuario aparezca cuanto antes, sin
  // esperar a que termine de cargar todo lo demás). La llamamos de nuevo acá
  // como respaldo — es idempotente — por si esa primera llamada no llegó a
  // dispararse a tiempo.
  await restaurarSesion();
  // Fecha de visualización (header)
  const f = document.getElementById('fecha-global');
  f.value = todayISO();
  f.addEventListener('change', async () => {
    await window.cargarDistFecha(getFecha());
    renderAll();
  });

  // Fecha de asignación: por defecto mañana
  const manana = new Date();
  manana.setDate(manana.getDate() + 1);
  const asigEl = document.getElementById('dist-fecha-asig');
  if (asigEl) {
    asigEl.value = manana.toISOString().slice(0,10);
    // Cargar la distribución de esa fecha
    window.cargarDistFecha(asigEl.value);
  }

  poblarSelects();
  renderAll();
}

async function onCambiarFechaAsig() {
  const fecha = getFechaAsig();
  await window.cargarDistFecha(fecha);
  renderDist();
}

async function cargarDistYRender() {
  await window.cargarDistFecha(getFecha());
  renderAll();
}

function poblarSelects(){
  const opts=TURNOS.map(t=>`<option value="${t}">${t}</option>`).join('');
  ['dist-turno','nom-turno'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    // Limpiar antes de agregar para evitar duplicados si se llama más de una vez
    el.innerHTML='<option value="">Todos los turnos</option>'+opts;
  });
  poblarDistZonaFiltro();
}

function poblarDistZonaFiltro(){
  const sel=document.getElementById('dist-zona-filtro');
  if(!sel) return;
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas las zonas</option><option value="__sin__">Sin asignar</option>';
  allZonas().forEach(z=>sel.insertAdjacentHTML('beforeend',`<option value="${z}">${z}</option>`));
  sel.value=cur;
}

function renderAll(){
  actualizarBadgeActivos();
  renderDist();
  renderNomina();
  renderNovedades();
  renderZonas();
}

function actualizarBadgeActivos(){
  const hoy=getFecha();
  const act=window.nomina.filter(p=>getEstadoPersona(p,hoy)!=='Baja').length;
  document.getElementById('badge-activos').textContent=act+' activos';
}

// ============================================================
//  PANEL DISTRIBUCIÓN
// ============================================================
function renderDist(){
  const hoy=getFecha();
  const fechaAsig=getFechaAsig();
  const dist=getDistAsig();
  const busq=(document.getElementById('dist-buscar').value||'').toLowerCase();
  const filtTurno=document.getElementById('dist-turno').value;
  const filtZona=document.getElementById('dist-zona-filtro').value;
  const activos=window.nomina.filter(p=>getEstadoPersona(p,hoy)!=='Baja');

  // Personas que trabajan en la fecha de asignación
  const diaAsig = new Date(fechaAsig+'T12:00:00').getDay();
  const esFeriadoAsig = esFeriado(fechaAsig);
  const trabajanEseDia = activos.filter(p=>trabajaHoy(p,fechaAsig));

  // Mostrar indicador de fecha de asignación
  const DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const labelFechaAsig = document.getElementById('dist-info');

  const conZona=trabajanEseDia.filter(p=>dist[p.id]).length;
  const sinAsignar=trabajanEseDia.filter(p=>!dist[p.id]&&getEstadoPersona(p,hoy)!=='Licencia').length;
  const novHoy=novedadesHoy();
  const ausentes=novHoy.filter(n=>n.tipo==='Ausencia').length;
  const licencias=activos.filter(p=>getEstadoPersona(p,hoy)==='Licencia').length;

  document.getElementById('dist-stats').innerHTML=`
    <div class="stat-card"><div class="stat-num">${trabajanEseDia.length}</div><div class="stat-label">Trabajan ${DIAS[diaAsig]}${esFeriadoAsig?' 🔴 Feriado':''}</div></div>
    <div class="stat-card"><div class="stat-num">${conZona}</div><div class="stat-label">Asignados</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--rojo)">${sinAsignar}</div><div class="stat-label">Sin asignar</div></div>
    <div class="stat-card"><div class="stat-num">${ausentes}</div><div class="stat-label">Ausentes hoy</div></div>
    <div class="stat-card"><div class="stat-num">${licencias}</div><div class="stat-label">En licencia</div></div>
  `;

  const evHoy=(window.eventos||[]).filter(e=>e.fecha===hoy);
  document.getElementById('eventos-banner').innerHTML=evHoy.length?
    `<div class="eventos-banner"><span style="font-weight:700;font-size:13px">⚡ Eventos hoy:</span>${evHoy.map(e=>`<span class="ev-pill">${esc(e.nombre)} — ${esc(e.tipo)}</span>`).join('')}</div>`:'';

  let lista=trabajanEseDia.filter(p=>{
    if(busq&&!p.nombre.toLowerCase().includes(busq)&&!(p.dni||'').includes(busq)) return false;
    if(filtTurno&&p.turno!==filtTurno) return false;
    if(filtZona==='__sin__'&&dist[p.id]) return false;
    if(filtZona&&filtZona!=='__sin__'&&dist[p.id]!==filtZona) return false;
    return true;
  }).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  lista=ordenarLista(lista,'dist',(p,campo)=>campo==='zona'?(dist[p.id]||''):p[campo]);

  document.getElementById('dist-head').innerHTML=
    thOrden('dist','nombre','Nombre','renderDist')
    +thOrden('dist','turno','Turno','renderDist')
    +thOrden('dist','zona','Zona asignada','renderDist')
    +'<span>Novedades</span><span></span>';

  const estAsig = fechaAsig !== hoy ? ` · Asignando para ${DIAS[diaAsig]} ${fmtDate(fechaAsig)}` : '';
  document.getElementById('dist-info').textContent=`Mostrando ${lista.length} de ${trabajanEseDia.length} personas que trabajan ese día${estAsig}`;

  document.getElementById('dist-body').innerHTML=lista.map(p=>{
    const zona=dist[p.id]||'';
    const novs=novsDePersonaHoy(p.id);
    const est=getEstadoPersona(p,hoy);
    return `<div class="table-row grid-dist">
      <div>
        <div class="nombre-cell">${esc(p.nombre)}</div>
        <div class="sub-cell">${esc(p.jefatura||'—')} · ${esc(p.celular||'—')}</div>
      </div>
      <div>${badgeTurno(p.turno)}</div>
      <div style="font-size:13px;color:${zona?'#222;font-weight:600':'#aaa'}">${esc(zona||'Sin asignar')}</div>
      <div>${novs.map(n=>badgeNov(n.tipo)).join(' ')}${est==='Licencia'?badgeEstado('Licencia'):''}</div>
      <div><button onclick="abrirModalVer('${p.id}')" style="background:none;border:none;font-size:16px;cursor:pointer">👁</button></div>
    </div>`;
  }).join('');
}

// ============================================================
//  PANEL NÓMINA
// ============================================================
function renderNomina(){
  const hoy=getFecha();
  const busq=(document.getElementById('nom-buscar').value||'').toLowerCase();
  const filtTurno=document.getElementById('nom-turno').value;
  const filtEst=document.getElementById('nom-estado').value;

  let lista=window.nomina.filter(p=>{
    if(busq&&!p.nombre.toLowerCase().includes(busq)&&!(p.dni||'').includes(busq)) return false;
    if(filtTurno&&p.turno!==filtTurno) return false;
    const est=getEstadoPersona(p,hoy);
    if(filtEst&&est!==filtEst) return false;
    return true;
  }).sort((a,b)=>{
    // Orden por defecto: los dados de baja van al final; el resto, alfabético.
    // Se pisa si el usuario clickeó una columna (ver ordenarLista más abajo).
    const ba=getEstadoPersona(a,hoy)==='Baja'?1:0;
    const bb=getEstadoPersona(b,hoy)==='Baja'?1:0;
    if(ba!==bb) return ba-bb;
    return (a.nombre||'').localeCompare(b.nombre||'');
  });
  lista=ordenarLista(lista,'nom',(p,campo)=>campo==='estado'?getEstadoPersona(p,hoy):p[campo]);

  document.getElementById('nom-head').innerHTML=
    thOrden('nom','nombre','Nombre','renderNomina')
    +thOrden('nom','turno','Turno','renderNomina')
    +thOrden('nom','rol','Rol','renderNomina')
    +thOrden('nom','dni','DNI','renderNomina')
    +thOrden('nom','estado','Estado','renderNomina')
    +'<span>Acciones</span>';

  document.getElementById('nom-info').textContent=`${lista.length} personas encontradas`;
  document.getElementById('nom-body').innerHTML=lista.map((p,i)=>{
    const est=getEstadoPersona(p,hoy);
    return `<div class="table-row grid-nom" style="${est==='Baja'?'background:#fff5f5':''}">
      <div>
        <div class="nombre-cell" style="color:${est==='Baja'?'#c0392b':'#222'}">${esc(p.nombre)}</div>
        <div class="sub-cell">${esc(p.jefatura||'—')} · ${esc(p.coordinador||'—')}</div>
      </div>
      <div>${badgeTurno(p.turno)}</div>
      <div style="font-size:12px;color:#555">${esc(p.rol||'Inspector')}</div>
      <div style="font-size:12px;color:#555">${esc(p.dni||'—')}</div>
      <div>${badgeEstado(est)}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="btn btn-gris btn-sm" onclick="abrirModalVer('${p.id}')">👁 Ver</button>
        <button class="btn btn-gris btn-sm" onclick="exportarHistPersonaId('${p.id}')" title="Exportar">📥</button>
      </div>
    </div>`;
  }).join('');
}

      return `<div style="background:#f9f9f9;border:1px solid var(--bor);border-radius:0;padding:10px 14px;display:flex;gap:10px;align-items:center;margin-bottom:6px;flex-wrap:wrap">

      </div>`;
    }).join('')
    :`<div style="color:#aaa;font-size:13px;padding:8px 0">Sin novedades activas para hoy.</div>`;

  let hist=[...window.novedades].reverse().filter(n=>{
    const p=window.nomina.find(x=>x.id===n.personaId)||{};

    thOrden('hist','fecha','Fecha','renderNovedades')
    +thOrden('hist','persona','Persona','renderNovedades')
    +thOrden('hist','tipo','Tipo','renderNovedades')

  document.getElementById('nov-body').innerHTML=hist.map((n,i)=>{

    const extra=n.licIni?`${fmtDate(n.licIni)}→${fmtDate(n.licFin)}`:'';
    return `<div class="table-row grid-hist" style="${i%2===0?'':'background:#fafafa'}">
      <span style="font-size:12px;color:#777">${fmtDate(n.fecha)}</span>

      ${badgeNov(n.tipo)}
      <span style="font-size:12px;color:#555">${esc(n.detalle||extra||'—')}</span>

    </div>`;
  }).join('');
}

function exportarResumenZonas(){
  const hoy=getFecha();
  const fechaAsig=getFechaAsig();
  const dist=getDistAsig();
  const activos=window.nomina.filter(p=>getEstadoPersona(p,hoy)!=='Baja');

  // Usar SheetJS para formato visual
  const wb = XLSX.utils.book_new();
  const aoa = []; // array of arrays

  const fechaObj = new Date(fechaAsig+'T12:00:00');
  const DIAS = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const diaNombre = DIAS[fechaObj.getDay()];
  const diaNum    = fechaObj.getDate();
  const mesNombre = MESES[fechaObj.getMonth()];
  const anio      = fechaObj.getFullYear();

  // Agrupar personas por zona
  const zonaMap = {};
  allZonas().forEach(z => { zonaMap[z] = []; });
  activos.forEach(p => { if(dist[p.id] && zonaMap[dist[p.id]]) zonaMap[dist[p.id]].push(p); });
  const zonasConPersonas = Object.entries(zonaMap).filter(([z,ps])=>ps.length>0);

  // --- ENCABEZADO ---
  aoa.push([]);
  aoa.push(['', diaNombre]);
  aoa.push([]);
  aoa.push([]);
  aoa.push([]);
  aoa.push(['', `${diaNum} de ${mesNombre} de ${anio}`]);
  aoa.push([]);

  // --- ZONAS EN COLUMNAS (de a 2 columnas por zona: datos | vacía) ---
  const COLS_POR_ZONA = 2;
  const ZONAS_POR_FILA = 4; // 4 zonas por bloque horizontal
  const bloques = [];
  for (let i=0; i < zonasConPersonas.length; i+=ZONAS_POR_FILA) {
    bloques.push(zonasConPersonas.slice(i, i+ZONAS_POR_FILA));
  }

  bloques.forEach(bloque => {
    // Fila de nombres de zona
    const filaZona = [''];
    bloque.forEach(([zona, ps]) => {
      filaZona.push(`${zona} (${ps.length})`);
      filaZona.push('');
    });
    aoa.push(filaZona);

    // Filas de personas
    const maxPersonas = Math.max(...bloque.map(([,ps])=>ps.length));
    for (let i=0; i<maxPersonas; i++) {
      const fila = [''];
      bloque.forEach(([zona, ps]) => {
        const p = ps[i];
        fila.push(p ? p.nombre : '');
        fila.push('');
      });
      aoa.push(fila);
    }
    aoa.push([]); // espacio entre bloques
  });

  // --- LISTA COMPLETA (columna I en adelante) ---
  const colListaStart = ZONAS_POR_FILA * COLS_POR_ZONA + 2;
  // Inyectar en fila 8 (índice 7): header lista
  while (aoa.length < 8) aoa.push([]);
  const headerListaFila = 7;
  while (aoa[headerListaFila].length < colListaStart) aoa[headerListaFila].push('');
  aoa[headerListaFila][colListaStart] = 'Lista de Inspectores';

  // Llenar personas de la lista al lado del resumen (todas las asignadas, ordenadas alfabéticamente)
  const todasAsignadas = activos
    .filter(p=>dist[p.id])
    .sort((a,b)=>a.nombre.localeCompare(b.nombre));
  todasAsignadas.forEach((p,i) => {
    const filaIdx = headerListaFila + 1 + i;
    while (aoa.length <= filaIdx) aoa.push([]);
    while (aoa[filaIdx].length < colListaStart) aoa[filaIdx].push('');
    aoa[filaIdx][colListaStart] = p.nombre;
    aoa[filaIdx][colListaStart+1] = p.turno;
    aoa[filaIdx][colListaStart+2] = dist[p.id];
  });

  // --- RESUMEN LATERAL (conteo por zona) ---
  const colResStart = colListaStart + 4;
  const zonaHeader = 6;
  while (aoa[zonaHeader].length < colResStart) aoa[zonaHeader].push('');
  aoa[zonaHeader][colResStart] = 'ZONA';
  aoa[zonaHeader][colResStart+1] = 'CANT.';
  zonasConPersonas.forEach(([zona, ps], i) => {
    const filaIdx = zonaHeader + 1 + i;
    while (aoa.length <= filaIdx) aoa.push([]);
    while (aoa[filaIdx].length < colResStart) aoa[filaIdx].push('');
    aoa[filaIdx][colResStart] = zona;
    aoa[filaIdx][colResStart+1] = ps.length;
  });
  // Total
  const totalFila = zonaHeader + 1 + zonasConPersonas.length;
  while (aoa.length <= totalFila) aoa.push([]);
  while (aoa[totalFila].length < colResStart) aoa[totalFila].push('');
  aoa[totalFila][colResStart] = 'TOTAL';
  aoa[totalFila][colResStart+1] = todasAsignadas.length;

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  // Anchos de columna
  const colWidths = [];
  for (let i=0; i<colResStart+3; i++) {
    if (i===0) colWidths.push({wch:2});
    else if (i % 2 === 1 && i < colListaStart) colWidths.push({wch:28});
    else if (i % 2 === 0 && i < colListaStart) colWidths.push({wch:2});
    else if (i === colListaStart) colWidths.push({wch:35});
    else if (i === colListaStart+1) colWidths.push({wch:16});
    else if (i === colListaStart+2) colWidths.push({wch:22});
    else if (i === colResStart) colWidths.push({wch:25});
    else colWidths.push({wch:8});
  }
  ws['!cols'] = colWidths;

  XLSX.utils.book_append_sheet(wb, ws, 'DISTRIBUCIÓN');
  XLSX.writeFile(wb, `distribucion_${fechaAsig}.xlsx`);
  toast('✅ Resumen de zonas exportado');
}

function exportNominaExcel(personas, filename, sheetName) {
  const TURNO_DESC = {
    'Turno Mañana':  'Lun–Vie días hábiles 07–14 hs',
    'Turno Tarde':   'Lun–Vie días hábiles 13–20 hs',
    'Turno Noche':   'Lun–Jue sin importar feriados 19–01 hs',
    'SADOFE Diurno': 'Sáb–Dom–Feriados 07–19 hs (10 hs ef.)',
    'SADOFE Noche':  'Vie–Sáb–Dom 19–01 hs',
    'Administrativo':'Administrativo',
    'Gerencia':      'Gerencia',
  };

  const hoy = getFecha();

  // Columnas y su orden
  const COLS = [
    { k:'nombre',             h:'APELLIDO Y NOMBRE'          },
    { k:'estado',             h:'ESTADO'                     },
    { k:'turno',              h:'TURNO'                      },
    { k:'_turnoDesc',         h:'DESCRIPCIÓN TURNO'          },
    { k:'dni',                h:'DNI'                        },
    { k:'cuil',               h:'CUIL'                       },
    { k:'cbu',                h:'CBU'                        },
    { k:'jefatura',           h:'JEFATURA'                   },
    { k:'coordinador',        h:'COORDINADOR'                },
    { k:'modalidad',          h:'MODALIDAD'                  },
    { k:'genero',             h:'GÉNERO'                     },
    { k:'fechaNacimiento',    h:'FECHA NACIMIENTO'           },
    { k:'fechaIngreso',       h:'FECHA INGRESO'              },
    { k:'celular',            h:'CELULAR PARTICULAR'         },
    { k:'mailPersonal',       h:'MAIL PERSONAL'              },
    { k:'mailInstitucional',  h:'MAIL INSTITUCIONAL'         },
    { k:'oficinaCalle',       h:'OFICINA/CALLE'              },
    { k:'semanaFds',          h:'SEMANA/FDS'                 },
    { k:'horario',            h:'HORARIO'                    },
    { k:'contactoEmergencia', h:'CONTACTO EMERGENCIA'        },
    { k:'telEmergencia',      h:'TEL. EMERGENCIA'            },
    { k:'domicilio',          h:'DOMICILIO'                  },
    { k:'cabaPba',            h:'CABA/PBA'                   },
    { k:'barrio',             h:'BARRIO/LOCALIDAD'           },
    { k:'comuna',             h:'COMUNA'                     },
    { k:'agentes_calle',      h:'AGENTES EN CALLE'           },
    { k:'chaleco',            h:'CHALECO'                    },
    { k:'talle',              h:'TALLE'                      },
    { k:'leyLucio',           h:'LEY LUCIO'                  },
    { k:'leyYolanda',         h:'LEY YOLANDA'                },
    { k:'leyMicaela',         h:'LEY MICAELA'                },
    { k:'leyDiscapacidad',    h:'LEY DISCAPACIDAD'           },
    { k:'celularFlota',       h:'CELULAR FLOTA'              },
    { k:'imei',               h:'IMEI'                       },
    { k:'motivoBaja',         h:'MOTIVO BAJA'                },
    { k:'fechaBaja',          h:'FECHA BAJA'                 },
  ];

  // Construir filas
  const rows = personas.map(p => {
    const est = getEstadoPersona(p, hoy);
    const row = {};
    COLS.forEach(c => {
      if (c.k === '_turnoDesc') row[c.h] = TURNO_DESC[p.turno] || '';
      else if (c.k === 'estado') row[c.h] = est;
      else row[c.h] = p[c.k] || '';
    });
    return row;
  });

  // Crear workbook con XLSX.js
  const ws = XLSX.utils.json_to_sheet(rows, { header: COLS.map(c=>c.h) });

  // Ancho de columnas
  const colWidths = COLS.map(c => ({
    wch: Math.max(c.h.length, 14)
  }));
  colWidths[0].wch = 35; // Nombre más ancho
  colWidths[2].wch = 18; // Turno
  colWidths[3].wch = 38; // Descripción turno
  ws['!cols'] = colWidths;

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName || 'NOMINA');
  XLSX.writeFile(wb, filename);
  toast('✅ Excel exportado: ' + filename);
}
</script>

</body>
